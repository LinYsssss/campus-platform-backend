name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build backend jar
        run: mvn -pl campus-server -am clean package -DskipTests

      - name: Verify jar artifact
        run: test -f campus-server/target/campus-server-1.0.0-SNAPSHOT.jar

      - name: Upload jar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: campus-server/target/campus-server-1.0.0-SNAPSHOT.jar
          target: /home/ubuntu/
          strip_components: 2
          overwrite: true

      - name: Restart backend service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            sudo mv /home/ubuntu/campus-server-1.0.0-SNAPSHOT.jar /opt/apps/backend/campus-server.jar
            sudo systemctl restart campus-backend
            sudo systemctl status campus-backend --no-pager -l
            curl -I http://127.0.0.1:8080/api/doc.html
